<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMusic Player</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #1e2a35;
  --bg2:      #2c3a47;
  --bg3:      #3e4b57;
  --blue:     #4293f5;
  --bluedark: #1c4f8c;
  --bluelit:  #7db9ff;
  --white:    #ffffff;
  --muted:    #8fa8bf;
  --border:   rgba(255,255,255,0.15);
  --glow:     0 0 18px rgba(66,147,245,0.45);
  --radius:   12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Noto Sans',sans-serif;}
body{display:flex;justify-content:center;align-items:flex-start;padding:16px;min-height:100vh;
  background-image:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(66,147,245,.07) 0,transparent 60%),
                   radial-gradient(ellipse 60% 60% at 85% 90%,rgba(28,79,140,.1) 0,transparent 60%);}

/* ── APP WRAPPER ── */
#app{width:100%;max-width:960px;display:flex;flex-direction:column;gap:12px;}

/* ── HEADER ── */
.hdr{text-align:center;padding:14px 0 6px;}
.hdr h1{font-family:'Exo 2',sans-serif;font-size:2rem;font-weight:900;letter-spacing:4px;
  background:linear-gradient(120deg,#4293f5 30%,#a0d4ff 70%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr .sub{font-size:12px;color:var(--muted);letter-spacing:1px;margin-top:3px;}

/* ── MAIN PANEL ── */
.panel{background:var(--bg3);border:2px solid var(--border);border-radius:16px;overflow:hidden;}

/* ── TABS ── */
.tabbar{display:flex;background:var(--bg);padding:8px 8px 0;gap:4px;border-bottom:2px solid var(--border);}
.tabbar button{background:var(--blue);color:#fff;border:none;padding:10px 16px;border-radius:8px 8px 0 0;
  cursor:pointer;font-family:'Noto Sans',sans-serif;font-weight:600;font-size:13px;
  transition:all .2s;white-space:nowrap;margin-bottom:-2px;border-bottom:2px solid transparent;}
.tabbar button:hover{background:var(--bluedark);}
.tabbar button.active{background:var(--bg3);border:2px solid var(--border);border-bottom:2px solid var(--bg3);box-shadow:var(--glow);}

/* ── TAB CONTENT ── */
.tab{display:none;padding:20px;flex-direction:column;gap:14px;min-height:440px;}
.tab.on{display:flex;}

/* ── SONG TITLE ── */
.song-title{text-align:center;font-family:'Exo 2',sans-serif;font-size:1.5rem;font-weight:700;
  letter-spacing:.5px;min-height:42px;word-break:break-word;padding:6px 4px;
  text-shadow:0 0 24px rgba(66,147,245,.55);line-height:1.3;}
.dot{display:inline-block;width:9px;height:9px;background:var(--blue);border-radius:50%;
  margin-right:8px;animation:pulse 1.1s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}

/* ── RANGE SLIDERS ── */
.prog-row{display:flex;align-items:center;gap:10px;}
.time-lbl{font-family:'Exo 2',sans-serif;font-size:13px;color:var(--muted);min-width:105px;text-align:right;white-space:nowrap;}
.vol-row{display:flex;align-items:center;gap:10px;}
.vol-row span{font-size:13px;color:var(--muted);white-space:nowrap;}
.vol-lbl{font-family:'Exo 2',sans-serif;font-size:13px;color:var(--muted);min-width:38px;}
input[type=range]{-webkit-appearance:none;width:100%;height:9px;background:var(--bg);
  border:1px solid var(--border);border-radius:5px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:19px;height:19px;
  background:var(--blue);border-radius:50%;border:2px solid #fff;
  box-shadow:0 0 8px rgba(66,147,245,.6);cursor:pointer;}
input[type=range]::-moz-range-thumb{width:19px;height:19px;background:var(--blue);
  border-radius:50%;border:2px solid #fff;cursor:pointer;}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn{background:var(--blue);color:#fff;border:2px solid rgba(255,255,255,.6);border-radius:14px;
  padding:10px 18px;cursor:pointer;font-family:'Noto Sans',sans-serif;font-weight:600;
  font-size:13.5px;transition:all .2s;flex:1;min-width:110px;}
.btn:hover{background:var(--bluedark);box-shadow:var(--glow);}
.btn:active{transform:scale(.97);}

/* ── QUEUE LIST ── */
.sec-lbl{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.5px;}
.queue-wrap{flex:1;overflow-y:auto;max-height:230px;display:flex;flex-direction:column;gap:5px;padding-right:4px;}
.queue-wrap::-webkit-scrollbar{width:5px;}
.queue-wrap::-webkit-scrollbar-track{background:var(--bg);}
.queue-wrap::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px;}
.qitem{background:var(--blue);border:2px solid rgba(255,255,255,.25);border-radius:9px;
  padding:7px 12px;cursor:pointer;transition:all .15s;font-size:12.5px;
  display:flex;align-items:center;gap:6px;}
.qitem:hover{background:var(--bluedark);border-color:rgba(255,255,255,.7);}
.qitem.now{background:var(--bluedark);border-color:#fff;box-shadow:var(--glow);}
.qitem .qname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qitem .qcnt{color:rgba(255,255,255,.65);font-size:11.5px;white-space:nowrap;}

/* ── EQ TAB ── */
.eq-canvas-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px;position:relative;}
#eq-canvas{width:100%;height:155px;display:block;}
.eq-row{display:flex;gap:10px;justify-content:space-around;padding:6px 0;}
.eq-band{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
.eq-band .eqlbl{font-size:11px;color:var(--muted);font-family:'Exo 2',sans-serif;}
.eq-band .dbval{font-size:11px;color:var(--bluelit);font-family:'Exo 2',sans-serif;font-weight:700;min-height:16px;}
.sl-vert-wrap{height:120px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.sl-vert{width:100px;height:28px;transform:rotate(-90deg) translateX(-36px);cursor:pointer;
  transform-origin:left center;-webkit-appearance:none;appearance:none;
  background:var(--bg);border:1px solid var(--border);border-radius:4px;}
.sl-vert::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  background:var(--blue);border-radius:50%;border:2px solid #fff;box-shadow:0 0 6px rgba(66,147,245,.6);}
.sl-vert::-moz-range-thumb{width:18px;height:18px;background:var(--blue);border-radius:50%;border:2px solid #fff;}

/* ── SPECTRUM TAB ── */
.spec-toggle{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);}
.spec-toggle input{width:17px;height:17px;accent-color:var(--blue);cursor:pointer;}
#spec-canvas{width:100%;height:210px;display:block;background:var(--bg);
  border:1px solid var(--border);border-radius:10px;}

/* ── PLAYLIST GRID ── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:10px;
  overflow-y:auto;max-height:540px;padding-right:4px;}
.pgrid::-webkit-scrollbar{width:5px;}
.pgrid::-webkit-scrollbar-track{background:var(--bg);}
.pgrid::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px;}
.scard{background:var(--blue);border:2px solid rgba(255,255,255,.25);border-radius:11px;
  padding:12px 9px;text-align:center;cursor:pointer;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:7px;min-height:100px;justify-content:center;}
.scard:hover{background:var(--bluedark);border-color:#fff;transform:translateY(-2px);box-shadow:var(--glow);}
.scard.now{background:var(--bluedark);border-color:#fff;box-shadow:var(--glow);}
.scard .cico{font-size:26px;}
.scard .cname{font-size:11.5px;font-weight:600;line-height:1.3;word-break:break-word;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.scard .ccnt{font-size:11.5px;color:rgba(255,255,255,.65);}

/* ── LOADING ── */
#loader{position:fixed;inset:0;background:rgba(20,30,38,.97);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:999;}
.spin{width:48px;height:48px;border:3px solid rgba(66,147,245,.2);border-top-color:var(--blue);
  border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-family:'Exo 2',sans-serif;font-size:1.1rem;color:var(--muted);letter-spacing:2px;}

/* ── ERROR / INFO BOXES ── */
.ebox{background:rgba(220,80,80,.18);border:1px solid rgba(220,80,80,.45);border-radius:8px;
  padding:12px 16px;font-size:13px;color:#ffaaaa;line-height:1.7;}
.ibox{background:rgba(66,147,245,.12);border:1px solid rgba(66,147,245,.3);border-radius:8px;
  padding:12px 16px;font-size:13px;color:var(--bluelit);line-height:1.7;}

/* ── SCROLLBAR GLOBAL ── */
*{scrollbar-width:thin;scrollbar-color:var(--blue) var(--bg);}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .tabbar{flex-wrap:wrap;}
  .tabbar button{flex:1;min-width:80px;padding:8px 8px;font-size:12px;}
  .btn{min-width:80px;padding:8px 10px;font-size:12.5px;}
  .song-title{font-size:1.15rem;}
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}
  .eq-row{gap:4px;}
  .sl-vert{width:90px;}
  .hdr h1{font-size:1.5rem;}
}
</style>
</head>
<body>

<div id="loader">
  <div class="spin"></div>
  <div class="load-txt" id="load-msg">ĐANG TẢI DỮ LIỆU TỪ SHEET...</div>
</div>

<div id="app">
  <div class="hdr">
    <h1>🎵 SMUSIC PLAYER</h1>
    <div class="sub" id="statusbar">Đang khởi động...</div>
  </div>

  <div class="panel">
    <div class="tabbar">
      <button class="active" data-tab="control">Điều khiển</button>
      <button data-tab="eq">EQ Thật</button>
      <button data-tab="spectrum">Spectrum</button>
      <button data-tab="playlist">Toàn bộ phát nhạc</button>
    </div>

    <div id="tab-control" class="tab on">
      <div class="song-title" id="song-title">Chưa chọn bài hát</div>

      <div class="prog-row">
        <input type="range" id="progress" min="0" max="1000" value="0">
        <span class="time-lbl" id="time-lbl">00:00 / 00:00</span>
      </div>

      <div class="vol-row">
        <span>🔊 Âm lượng:</span>
        <input type="range" id="vol-sl" min="0" max="100" value="100">
        <span class="vol-lbl" id="vol-lbl">100%</span>
      </div>

      <div class="btn-row">
        <button class="btn" id="btn-mode"  onclick="toggleMode()">Chế độ: Ngẫu nhiên</button>
        <button class="btn" id="btn-play"  onclick="togglePlay()">▶ Phát / Tạm dừng</button>
        <button class="btn"               onclick="nextTrackBtn()">⏭ Next</button>
      </div>

      <div class="sec-lbl">🎵 Hàng đợi phát hiện tại (Lưu tự động siêu tốc):</div>
      <div class="queue-wrap" id="queue-wrap"></div>
    </div>

    <div id="tab-eq" class="tab">
      <div class="eq-canvas-box">
        <canvas id="eq-canvas" height="155"></canvas>
      </div>
      <div class="eq-row" id="eq-row"></div>
    </div>

    <div id="tab-spectrum" class="tab">
      <label class="spec-toggle">
        <input type="checkbox" id="spec-chk" checked onchange="toggleSpectrum(this.checked)">
        <span>Bật Spectrum (Tắt để giảm Lag)</span>
      </label>
      <canvas id="spec-canvas" height="210"></canvas>
    </div>

    <div id="tab-playlist" class="tab">
      <div class="pgrid" id="pgrid"></div>
    </div>
  </div>
</div>

<audio id="aud" crossorigin="anonymous" preload="none"></audio>

<script>
/* ============================================================
   CONFIG - LINK TỚI GOOGLE APPS SCRIPT
   ============================================================ */
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzSYNsMXrLZjxBh_U7am5w40h-yhU82c59VsEonBGoeJ_JOU_GOiQYFD5Azx9efWrukdA/exec";

const STORE_KEY  = 'smusic_v4_storage';
const EQ_FREQS   = [60, 150, 400, 1000, 2400, 15000];
const EQ_LABELS  = ['60Hz','150Hz','400Hz','1KHz','2.4KHz','15KHz'];
const EQ_TYPES   = ['lowshelf','peaking','peaking','peaking','peaking','highshelf'];

// Tua nhanh với bài đặc biệt (Giây)
const SONG_STARTS = { 'leave me alone': 22, 'broken strings': 30 };

/* ============================================================
   STATE
   ============================================================ */
let S = {
  playlist:   [],
  queue:      [],
  idx:        0,
  random:     true,
  volume:     100,
  counts:     {},
  eq:         [0,0,0,0,0,0],
  spectrum:   true,
  savedTime:  0,
};

/* ============================================================
   BIẾN TOÀN CỤC
   ============================================================ */
const aud = document.getElementById('aud');
let actx = null, analyser = null, gainNode = null;
const eqFilters = [];
let audReady = false;

let countAdded    = false;
let isNextPress   = false;
let totalSeekMs   = 0;
let dragging      = false;
let seekSnapStart = 0;

/* ============================================================
   KHỞI ĐỘNG
   ============================================================ */
async function init() {
  loadStateFromBrowser();
  buildEQSliders();
  hookProgress();
  hookVolume();
  hookTabs();
  await fetchFromGoogle();
  applyUI();
  hideLoader();

  setInterval(saveStateToBrowser, 1000);
  setInterval(tickUI, 200);
}

/* ============================================================
   LƯU TRỮ LOCALSTORAGE
   ============================================================ */
function loadStateFromBrowser() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    if (s) Object.assign(S, JSON.parse(s));
  } catch(e) {}
}

function saveStateToBrowser() {
  try {
    if (aud.currentTime > 0) S.savedTime = aud.currentTime;
    const stateToSave = {
      queue: S.queue, idx: S.idx, random: S.random,
      volume: S.volume, eq: S.eq, spectrum: S.spectrum, savedTime: S.savedTime
    };
    localStorage.setItem(STORE_KEY, JSON.stringify(stateToSave));
  } catch(e) {}
}

/* ============================================================
   KẾT NỐI API GOOGLE
   ============================================================ */
async function fetchFromGoogle() {
  setStatus('Đang lấy dữ liệu từ Google Sheets...');

  if (!WEB_APP_URL || !WEB_APP_URL.startsWith('https://script.google.com')) {
    setStatus('⚠️ Thiếu Link Apps Script hợp lệ');
    return;
  }

  try {
    const res  = await fetch(WEB_APP_URL);
    const data = await res.json();

    // ── DEBUG: In dữ liệu thô ra console để kiểm tra ──
    console.log('[SMusic] Dữ liệu trả về từ Apps Script:', data);
    if (data.songs && data.songs.length > 0) {
      console.log('[SMusic] Mẫu bài hát đầu tiên:', JSON.stringify(data.songs[0]));
    }

    if (!data.songs || !Array.isArray(data.songs) || data.songs.length === 0) {
      throw new Error('Apps Script không trả về danh sách bài hát hợp lệ');
    }

    // ── LỌC: Chỉ nhận bài có đủ name và url ──
    const validSongs = data.songs.filter(s => {
      if (!s.name || !s.url) {
        console.warn('[SMusic] Bỏ qua bài thiếu name/url:', JSON.stringify(s));
        return false;
      }
      return true;
    });

    if (validSongs.length === 0) {
      throw new Error(
        'Tất cả bài hát đều thiếu thuộc tính "url". ' +
        'Kiểm tra lại Google Apps Script — xem hướng dẫn trong Code.gs!'
      );
    }

    if (validSongs.length < data.songs.length) {
      console.warn(
        `[SMusic] ${data.songs.length - validSongs.length} bài bị bỏ qua do thiếu url`
      );
    }

    S.playlist = validSongs;
    S.counts   = data.counts || {};

    setStatus(`✅ Đã đồng bộ ${S.playlist.length} bài hát`);
    buildInitialQueue();
    renderGrid();

  } catch(err) {
    console.error('[SMusic] Lỗi fetchFromGoogle:', err);
    setStatus('⚠️ ' + err.message + ' — Mở DevTools (F12) xem chi tiết');
  }
}

async function pushCountToGoogle(songName) {
  try {
    await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateCount', songName }),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    });
  } catch(err) {
    console.warn('[SMusic] Lỗi đồng bộ lượt nghe:', err);
  }
}

/* ============================================================
   QUẢN LÝ HÀNG ĐỢI
   ============================================================ */
function buildInitialQueue() {
  const pl = S.playlist.map(s => s.name);
  if (S.queue.length > 0) {
    const valid = S.queue.filter(n => pl.includes(n));
    if (valid.length) {
      S.queue = valid;
      if (S.idx >= S.queue.length) S.idx = 0;
      renderQueue();
      return;
    }
  }
  S.queue = [...pl];
  if (S.random) fisherYates(S.queue);
  S.idx = 0;
  saveStateToBrowser();
  renderQueue();
}

function fisherYates(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* ============================================================
   CỐT LÕI PHÁT NHẠC
   ============================================================ */

// ── FIX: getSong với trim để tránh lỗi khoảng trắng ──
function getSong(name) {
  if (!name) return null;
  const trimmed = name.trim();
  return S.playlist.find(s => s.name && s.name.trim() === trimmed) || null;
}

// ── FIX: playTrack đọc trực tiếp song.url, có validation rõ ràng ──
function playTrack(qIdx, isResume = false) {
  countAdded = false; isNextPress = false; totalSeekMs = 0;
  S.idx = qIdx;

  const name = S.queue[qIdx];
  if (!name) {
    console.error('[SMusic] Không có bài hát tại index:', qIdx);
    return;
  }

  const song = getSong(name);
  if (!song) {
    console.error('[SMusic] Không tìm thấy trong playlist:', name);
    setStatus('⚠️ Không tìm thấy bài: ' + name);
    return;
  }

  // ── KIỂM TRA URL: đây là nguyên nhân lỗi /undefined ──
  if (!song.url) {
    console.error('[SMusic] Bài hát thiếu thuộc tính "url":', JSON.stringify(song));
    setStatus('⚠️ Link nhạc bị thiếu cho "' + name + '" — Kiểm tra Apps Script!');
    return;
  }

  console.log('[SMusic] Phát:', name, '|', song.url.substring(0, 80) + '...');

  ensureAudioCtx();

  // Gán URL trực tiếp từ song.url (không dùng fallback gây nhầm lẫn)
  aud.src = song.url;
  aud.load();
  aud.play().catch(e => {
    console.warn('[SMusic] Play bị chặn:', e.message);
    setStatus('⚠️ Trình duyệt chặn tự động phát — Hãy bấm nút Play!');
  });

  // Xác định thời điểm bắt đầu
  let targetTime = 0;
  if (isResume && S.savedTime > 0) {
    targetTime = S.savedTime;
  } else {
    const lowName = name.toLowerCase();
    for (const [key, val] of Object.entries(SONG_STARTS)) {
      if (lowName.includes(key)) { targetTime = val; break; }
    }
  }

  if (targetTime > 0) {
    aud.addEventListener('canplay', function h() {
      aud.currentTime = targetTime;
      aud.removeEventListener('canplay', h);
    }, { once: true });
  }

  setTitle(name);
  renderQueue();
  renderGrid();
  saveStateToBrowser();
}

function togglePlay() {
  ensureAudioCtx();
  if (aud.paused) {
    if (!aud.src || aud.src === location.href) {
      playTrack(S.idx, true);
    } else {
      aud.play().catch(e => console.warn('[SMusic] Play error:', e));
    }
  } else {
    aud.pause();
    saveStateToBrowser();
  }
}

function nextTrackBtn() { isNextPress = true; nextTrack(); }

function nextTrack() {
  if (!S.queue.length) return;
  const lastSong = S.queue[S.idx];
  S.idx++;
  S.savedTime = 0;

  if (S.idx >= S.queue.length) {
    if (S.random && S.playlist.length > 1) {
      let tries = 0;
      do { fisherYates(S.queue); tries++; }
      while (S.queue[0] === lastSong && tries < 8);
      S.idx = 0;
    } else {
      S.idx = 0;
    }
    saveStateToBrowser();
  }
  playTrack(S.idx, false);
}

function toggleMode() {
  S.random = !S.random;
  const currentSong = S.queue[S.idx];
  S.queue = S.playlist.map(s => s.name);
  if (S.random) fisherYates(S.queue);

  const ci = S.queue.indexOf(currentSong);
  if (ci !== -1) {
    S.queue.splice(ci, 1);
    S.queue.unshift(currentSong);
    S.idx = 0;
  }

  document.getElementById('btn-mode').textContent =
    S.random ? 'Chế độ: Ngẫu nhiên' : 'Chế độ: Tuần tự';
  renderQueue();
  saveStateToBrowser();
}

/* ============================================================
   SỰ KIỆN AUDIO
   ============================================================ */
aud.addEventListener('ended', nextTrack);

aud.addEventListener('timeupdate', () => {
  if (dragging || !aud.duration) return;
  const pct = aud.currentTime / aud.duration;
  document.getElementById('progress').value = Math.round(pct * 1000);
  document.getElementById('time-lbl').textContent =
    fmt(aud.currentTime) + ' / ' + fmt(aud.duration);

  if (!countAdded && pct >= 0.9 && totalSeekMs <= 10000 && !isNextPress) {
    const songName = S.queue[S.idx];
    S.counts[songName] = (S.counts[songName] || 0) + 1;
    countAdded = true;
    renderQueue();
    renderGrid();
    pushCountToGoogle(songName);
  }
});

aud.addEventListener('error', (e) => {
  const code = aud.error ? aud.error.code : '?';
  console.error('[SMusic] Audio error code:', code, '| src:', aud.src);
  setStatus('⚠️ Lỗi phát nhạc (code ' + code + ') — File Drive có thể bị giới hạn băng thông hoặc chưa public');
});

/* ============================================================
   THANH ĐIỀU KHIỂN THỜI GIAN & ÂM LƯỢNG
   ============================================================ */
function hookProgress() {
  const sl = document.getElementById('progress');
  sl.addEventListener('mousedown',  () => { dragging = true; seekSnapStart = aud.currentTime; });
  sl.addEventListener('touchstart', () => { dragging = true; seekSnapStart = aud.currentTime; });
  sl.addEventListener('change', () => {
    if (!aud.duration) { dragging = false; return; }
    const t = (sl.value / 1000) * aud.duration;
    totalSeekMs += Math.abs(t - seekSnapStart) * 1000;
    aud.currentTime = t;
    seekSnapStart = t;
    dragging = false;
    saveStateToBrowser();
  });
}

function hookVolume() {
  const sl = document.getElementById('vol-sl');
  sl.value = S.volume;
  document.getElementById('vol-lbl').textContent = S.volume + '%';
  sl.addEventListener('input', () => {
    S.volume = +sl.value;
    document.getElementById('vol-lbl').textContent = S.volume + '%';
    aud.volume = S.volume / 100;
    if (gainNode) gainNode.gain.value = S.volume / 100;
    saveStateToBrowser();
  });
}

/* ============================================================
   WEB AUDIO API (EQ & SPECTRUM)
   ============================================================ */
function ensureAudioCtx() {
  if (audReady) {
    if (actx.state === 'suspended') actx.resume();
    return;
  }
  actx = new (window.AudioContext || window.webkitAudioContext)();
  const src = actx.createMediaElementSource(aud);
  let last = src;

  for (let i = 0; i < 6; i++) {
    const f = actx.createBiquadFilter();
    f.type            = EQ_TYPES[i];
    f.frequency.value = EQ_FREQS[i];
    f.gain.value      = S.eq[i];
    f.Q.value         = 1.0;
    last.connect(f); last = f;
    eqFilters.push(f);
  }

  analyser = actx.createAnalyser();
  analyser.fftSize = 512;
  analyser.smoothingTimeConstant = 0.8;
  last.connect(analyser);

  gainNode = actx.createGain();
  gainNode.gain.value = S.volume / 100;
  analyser.connect(gainNode);
  gainNode.connect(actx.destination);

  audReady = true;
  applyEQToFilters();
  if (S.spectrum) startSpec();
}

function buildEQSliders() {
  const row = document.getElementById('eq-row');
  row.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const band = document.createElement('div');
    band.className = 'eq-band';

    const db = document.createElement('div');
    db.className = 'dbval'; db.id = `eqdb-${i}`;
    db.textContent = fmtDb(S.eq[i]);

    const wrap = document.createElement('div');
    wrap.className = 'sl-vert-wrap';

    const sl = document.createElement('input');
    sl.type = 'range'; sl.className = 'sl-vert';
    sl.min = -12; sl.max = 12; sl.step = 1;
    sl.value = S.eq[i]; sl.id = `eqsl-${i}`;

    const idx = i;
    sl.addEventListener('input', () => {
      S.eq[idx] = +sl.value;
      db.textContent = fmtDb(S.eq[idx]);
      if (eqFilters[idx]) eqFilters[idx].gain.value = S.eq[idx];
      drawEQ();
      saveStateToBrowser();
    });

    const lbl = document.createElement('div');
    lbl.className = 'eqlbl'; lbl.textContent = EQ_LABELS[i];

    wrap.appendChild(sl);
    band.appendChild(db); band.appendChild(wrap); band.appendChild(lbl);
    row.appendChild(band);
  }
  drawEQ();
}

function applyEQToFilters() {
  for (let i = 0; i < 6; i++) {
    if (eqFilters[i]) eqFilters[i].gain.value = S.eq[i];
    const sl = document.getElementById(`eqsl-${i}`);
    if (sl) {
      sl.value = S.eq[i];
      document.getElementById(`eqdb-${i}`).textContent = fmtDb(S.eq[i]);
    }
  }
}

function drawEQ() {
  const cv = document.getElementById('eq-canvas');
  const W  = cv.clientWidth || cv.offsetWidth || 600;
  cv.width = W; const H = cv.height;
  const ctx = cv.getContext('2d');

  ctx.fillStyle = '#1e2a35';
  ctx.fillRect(0, 0, W, H);

  for (let db = -12; db <= 12; db += 3) {
    const y = H/2 - (db/12) * (H/2 - 14);
    ctx.strokeStyle = db === 0 ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.07)';
    ctx.lineWidth   = db === 0 ? 1.5 : 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    if (db !== 0 && db % 6 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,.25)';
      ctx.font = '10px Exo 2,sans-serif';
      ctx.fillText(db+'dB', 4, y - 2);
    }
  }
  for (let i = 0; i < 6; i++) {
    const x = ((i + .5) / 6) * W;
    ctx.strokeStyle = 'rgba(255,255,255,.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  const pts = [];
  for (let i = 0; i < 6; i++) {
    pts.push({ x: ((i+.5)/6)*W, y: H/2 - (S.eq[i]/12)*(H/2-14) });
  }
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(66,147,245,.35)');
  grad.addColorStop(1, 'rgba(66,147,245,.04)');

  ctx.beginPath();
  ctx.moveTo(0, H/2);
  ctx.lineTo(pts[0].x, pts[0].y);
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(i-1,0)], p1 = pts[i], p2 = pts[i+1], p3 = pts[Math.min(i+2,pts.length-1)];
    const cp1x = p1.x + (p2.x - p0.x)/6, cp1y = p1.y + (p2.y - p0.y)/6;
    const cp2x = p2.x - (p3.x - p1.x)/6, cp2y = p2.y - (p3.y - p1.y)/6;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
  }
  ctx.lineTo(W, H/2);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(i-1,0)], p1 = pts[i], p2 = pts[i+1], p3 = pts[Math.min(i+2,pts.length-1)];
    const cp1x = p1.x + (p2.x - p0.x)/6, cp1y = p1.y + (p2.y - p0.y)/6;
    const cp2x = p2.x - (p3.x - p1.x)/6, cp2y = p2.y - (p3.y - p1.y)/6;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
  }
  ctx.strokeStyle = '#4293f5';
  ctx.lineWidth = 2.5;
  ctx.shadowBlur = 10; ctx.shadowColor = '#4293f5';
  ctx.stroke(); ctx.shadowBlur = 0;

  for (const p of pts) {
    ctx.beginPath(); ctx.arc(p.x, p.y, 5.5, 0, Math.PI*2);
    ctx.fillStyle = '#7db9ff'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  }

  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.font = '10.5px Exo 2,sans-serif';
  for (let i = 0; i < 6; i++) {
    ctx.fillText(EQ_LABELS[i], ((i+.5)/6)*W - 12, H - 4);
  }
}

let specRaf = null;
let specW = 0;

function startSpec() {
  if (specRaf) return;
  const cv  = document.getElementById('spec-canvas');
  const ctx = cv.getContext('2d');
  const BARS = 32;

  function frame() {
    if (!S.spectrum) { specRaf = null; return; }
    specRaf = requestAnimationFrame(frame);

    const W = cv.clientWidth || cv.offsetWidth || 600;
    if (W !== specW) { cv.width = W; specW = W; }
    const H = cv.height;

    ctx.fillStyle = '#1e2a35';
    ctx.fillRect(0, 0, W, H);

    const bw = W / BARS;

    if (!analyser) {
      for (let i = 0; i < BARS; i++) {
        ctx.fillStyle = 'rgba(66,147,245,.2)';
        ctx.fillRect(i*bw+1, H-3, bw-2, 3);
      }
      return;
    }

    const buf = analyser.frequencyBinCount;
    const da  = new Uint8Array(buf);
    analyser.getByteFrequencyData(da);
    const step = Math.max(1, Math.floor(buf / BARS));

    for (let i = 0; i < BARS; i++) {
      let sum = 0;
      for (let j = 0; j < step; j++) sum += da[Math.min(i*step+j, buf-1)];
      const avg = sum / step;
      const h   = Math.max(3, (avg / 255) * (H - 4));

      const gr = ctx.createLinearGradient(0, H, 0, H-h);
      gr.addColorStop(0, '#1c4f8c');
      gr.addColorStop(.55, '#4293f5');
      gr.addColorStop(1,  '#a0d4ff');
      ctx.fillStyle = gr;

      const x = i*bw+1, y = H-h, w2 = bw-2;
      const r = Math.min(3, w2/2);
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.lineTo(x+w2-r, y);
      ctx.quadraticCurveTo(x+w2, y, x+w2, y+r);
      ctx.lineTo(x+w2, H);
      ctx.lineTo(x, H);
      ctx.lineTo(x, y+r);
      ctx.quadraticCurveTo(x, y, x+r, y);
      ctx.closePath();
      ctx.fill();
    }
  }
  frame();
}

function stopSpec() {
  if (specRaf) { cancelAnimationFrame(specRaf); specRaf = null; }
  const cv = document.getElementById('spec-canvas');
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#1e2a35';
  ctx.fillRect(0, 0, cv.clientWidth || 600, cv.height);
}

function toggleSpectrum(on) {
  S.spectrum = on;
  if (on) startSpec(); else stopSpec();
  saveStateToBrowser();
}

/* ============================================================
   CẬP NHẬT GIAO DIỆN
   ============================================================ */
function setTitle(name) {
  document.getElementById('song-title').innerHTML =
    `<span class="dot"></span>${name}`;
}

function renderQueue() {
  const el = document.getElementById('queue-wrap');
  el.innerHTML = '';
  for (let i = 0; i < S.queue.length; i++) {
    const n = S.queue[i], cnt = S.counts[n] || 0;
    const d = document.createElement('div');
    d.className = 'qitem' + (i === S.idx ? ' now' : '');
    d.innerHTML =
      `<span>${i===S.idx?'▶️':'🎵'}</span>` +
      `<span class="qname">${n}</span>` +
      `<span class="qcnt">🎧 x${cnt}</span>`;
    const ci = i;
    d.addEventListener('dblclick', () => { S.savedTime = 0; playTrack(ci, false); });
    el.appendChild(d);
  }
  const playing = el.querySelector('.now');
  if (playing) setTimeout(() => playing.scrollIntoView({behavior:'smooth',block:'nearest'}), 80);
}

function renderGrid() {
  const g = document.getElementById('pgrid');
  if (!S.playlist.length) return;
  g.innerHTML = '';
  const curName = S.queue[S.idx];
  for (const song of S.playlist) {
    const cnt = S.counts[song.name] || 0;
    const now = song.name === curName;
    const d   = document.createElement('div');
    d.className = 'scard' + (now ? ' now' : '');
    d.innerHTML =
      `<div class="cico">${now?'🎵':'🎶'}</div>` +
      `<div class="cname">${song.name}</div>` +
      `<div class="ccnt">🎧 x${cnt}</div>`;
    const nm = song.name;
    d.addEventListener('dblclick', () => {
      const qi = S.queue.indexOf(nm);
      S.savedTime = 0;
      if (qi !== -1) playTrack(qi, false);
      else { S.queue.splice(S.idx, 0, nm); playTrack(S.idx, false); }
    });
    g.appendChild(d);
  }
}

function applyUI() {
  document.getElementById('vol-sl').value = S.volume;
  document.getElementById('vol-lbl').textContent = S.volume + '%';
  document.getElementById('btn-mode').textContent =
    S.random ? 'Chế độ: Ngẫu nhiên' : 'Chế độ: Tuần tự';
  document.getElementById('spec-chk').checked = S.spectrum;
  applyEQToFilters();
  drawEQ();
  renderQueue();
  renderGrid();
  if (S.spectrum) setTimeout(startSpec, 400);
  if (S.queue[S.idx]) setTitle(S.queue[S.idx]);
}

function tickUI() {
  document.getElementById('btn-play').textContent =
    aud.paused ? '▶ Phát / Tạm dừng' : '⏸ Tạm dừng';
}

function hookTabs() {
  const tabs = ['control','eq','spectrum','playlist'];
  document.querySelectorAll('.tabbar button').forEach((btn, i) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tabbar button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
      btn.classList.add('active');
      document.getElementById('tab-' + tabs[i]).classList.add('on');
      if (tabs[i] === 'eq') setTimeout(drawEQ, 50);
      if (tabs[i] === 'spectrum' && S.spectrum) startSpec();
    });
  });
}

function fmt(sec) {
  if (!sec || isNaN(sec)) return '00:00';
  sec = Math.max(0, Math.floor(sec));
  return String(Math.floor(sec/60)).padStart(2,'0') + ':' + String(sec%60).padStart(2,'0');
}

function fmtDb(v) { return (v >= 0 ? '+' : '') + v + 'dB'; }

function setStatus(msg) { document.getElementById('statusbar').textContent = msg; }
function hideLoader()   { document.getElementById('loader').style.display = 'none'; }

window.addEventListener('resize', drawEQ);

// Khởi chạy
init();
</script>
