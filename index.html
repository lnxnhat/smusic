<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMusic Player - Cloud Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --bg:#1e2a35; --bg2:#2c3a47; --bg3:#3e4b57; --blue:#4293f5; --bluedark:#1c4f8c; --bluelit:#7db9ff; --white:#ffffff; --muted:#8fa8bf; --border:rgba(255,255,255,0.15); --glow:0 0 18px rgba(66,147,245,0.45); --radius:12px; }
*{box-sizing:border-box;margin:0;padding:0;} html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Noto Sans',sans-serif;}
body{display:flex;justify-content:center;align-items:flex-start;padding:16px;min-height:100vh; background-image:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(66,147,245,.07) 0,transparent 60%), radial-gradient(ellipse 60% 60% at 85% 90%,rgba(28,79,140,.1) 0,transparent 60%);}
#app{width:100%;max-width:960px;display:flex;flex-direction:column;gap:12px;}
.hdr{text-align:center;padding:14px 0 6px;} .hdr h1{font-family:'Exo 2',sans-serif;font-size:2rem;font-weight:900;letter-spacing:4px; background:linear-gradient(120deg,#4293f5 30%,#a0d4ff 70%); -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;} .hdr .sub{font-size:12px;color:var(--muted);letter-spacing:1px;margin-top:3px;}
.panel{background:var(--bg3);border:2px solid var(--border);border-radius:16px;overflow:hidden;}
.tabbar{display:flex;background:var(--bg);padding:8px 8px 0;gap:4px;border-bottom:2px solid var(--border);} .tabbar button{background:var(--blue);color:#fff;border:none;padding:10px 16px;border-radius:8px 8px 0 0; cursor:pointer;font-family:'Noto Sans',sans-serif;font-weight:600;font-size:13px; transition:all .2s;white-space:nowrap;margin-bottom:-2px;border-bottom:2px solid transparent;} .tabbar button:hover{background:var(--bluedark);} .tabbar button.active{background:var(--bg3);border:2px solid var(--border);border-bottom:2px solid var(--bg3);box-shadow:var(--glow);}
.tab{display:none;padding:20px;flex-direction:column;gap:14px;min-height:440px;} .tab.on{display:flex;}
.song-title{text-align:center;font-family:'Exo 2',sans-serif;font-size:1.5rem;font-weight:700; letter-spacing:.5px;min-height:42px;word-break:break-word;padding:6px 4px; text-shadow:0 0 24px rgba(66,147,245,.55);line-height:1.3;} .dot{display:inline-block;width:9px;height:9px;background:var(--blue);border-radius:50%; margin-right:8px;animation:pulse 1.1s ease infinite;} @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
.prog-row{display:flex;align-items:center;gap:10px;} .time-lbl{font-family:'Exo 2',sans-serif;font-size:13px;color:var(--muted);min-width:105px;text-align:right;white-space:nowrap;} .vol-row{display:flex;align-items:center;gap:10px;} .vol-row span{font-size:13px;color:var(--muted);white-space:nowrap;} .vol-lbl{font-family:'Exo 2',sans-serif;font-size:13px;color:var(--muted);min-width:38px;} input[type=range]{-webkit-appearance:none;width:100%;height:9px;background:var(--bg); border:1px solid var(--border);border-radius:5px;outline:none;cursor:pointer;} input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:19px;height:19px; background:var(--blue);border-radius:50%;border:2px solid #fff; box-shadow:0 0 8px rgba(66,147,245,.6);cursor:pointer;} input[type=range]::-moz-range-thumb{width:19px;height:19px;background:var(--blue); border-radius:50%;border:2px solid #fff;cursor:pointer;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;} .btn{background:var(--blue);color:#fff;border:2px solid rgba(255,255,255,.6);border-radius:14px; padding:10px 18px;cursor:pointer;font-family:'Noto Sans',sans-serif;font-weight:600; font-size:13.5px;transition:all .2s;flex:1;min-width:110px;} .btn:hover{background:var(--bluedark);box-shadow:var(--glow);} .btn:active{transform:scale(.97);}
.sec-lbl{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.5px;} .queue-wrap{flex:1;overflow-y:auto;max-height:230px;display:flex;flex-direction:column;gap:5px;padding-right:4px;} .queue-wrap::-webkit-scrollbar{width:5px;} .queue-wrap::-webkit-scrollbar-track{background:var(--bg);} .queue-wrap::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px;} .qitem{background:var(--blue);border:2px solid rgba(255,255,255,.25);border-radius:9px; padding:7px 12px;cursor:pointer;transition:all .15s;font-size:12.5px; display:flex;align-items:center;gap:6px;} .qitem:hover{background:var(--bluedark);border-color:rgba(255,255,255,.7);} .qitem.now{background:var(--bluedark);border-color:#fff;box-shadow:var(--glow);} .qitem .qname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;} .qitem .qcnt{color:rgba(255,255,255,.65);font-size:11.5px;white-space:nowrap;}
.eq-canvas-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px;position:relative;} #eq-canvas{width:100%;height:155px;display:block;} .eq-row{display:flex;gap:10px;justify-content:space-around;padding:6px 0;} .eq-band{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;} .eq-band .eqlbl{font-size:11px;color:var(--muted);font-family:'Exo 2',sans-serif;} .eq-band .dbval{font-size:11px;color:var(--bluelit);font-family:'Exo 2',sans-serif;font-weight:700;min-height:16px;} .sl-vert-wrap{height:120px;display:flex;align-items:center;justify-content:center;overflow:hidden;} .sl-vert{width:100px;height:28px;transform:rotate(-90deg) translateX(-36px);cursor:pointer; transform-origin:left center;-webkit-appearance:none;appearance:none; background:var(--bg);border:1px solid var(--border);border-radius:4px;} .sl-vert::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px; background:var(--blue);border-radius:50%;border:2px solid #fff;box-shadow:0 0 6px rgba(66,147,245,.6);} .sl-vert::-moz-range-thumb{width:18px;height:18px;background:var(--blue);border-radius:50%;border:2px solid #fff;}
.spec-toggle{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);} .spec-toggle input{width:17px;height:17px;accent-color:var(--blue);cursor:pointer;} #spec-canvas{width:100%;height:210px;display:block;background:var(--bg); border:1px solid var(--border);border-radius:10px;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:10px; overflow-y:auto;max-height:540px;padding-right:4px;} .pgrid::-webkit-scrollbar{width:5px;} .pgrid::-webkit-scrollbar-track{background:var(--bg);} .pgrid::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px;} .scard{background:var(--blue);border:2px solid rgba(255,255,255,.25);border-radius:11px; padding:12px 9px;text-align:center;cursor:pointer;transition:all .18s; display:flex;flex-direction:column;align-items:center;gap:7px;min-height:100px;justify-content:center;} .scard:hover{background:var(--bluedark);border-color:#fff;transform:translateY(-2px);box-shadow:var(--glow);} .scard.now{background:var(--bluedark);border-color:#fff;box-shadow:var(--glow);} .scard .cico{font-size:26px;} .scard .cname{font-size:11.5px;font-weight:600;line-height:1.3;word-break:break-word; display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;} .scard .ccnt{font-size:11.5px;color:rgba(255,255,255,.65);}
#loader{position:fixed;inset:0;background:rgba(20,30,38,.97);display:flex; flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:999;} .spin{width:48px;height:48px;border:3px solid rgba(66,147,245,.2);border-top-color:var(--blue); border-radius:50%;animation:spin .75s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}} .load-txt{font-family:'Exo 2',sans-serif;font-size:1.1rem;color:var(--muted);letter-spacing:2px;}
*{scrollbar-width:thin;scrollbar-color:var(--blue) var(--bg);}
@media(max-width:600px){ .tabbar{flex-wrap:wrap;} .tabbar button{flex:1;min-width:80px;padding:8px 8px;font-size:12px;} .btn{min-width:80px;padding:8px 10px;font-size:12.5px;} .song-title{font-size:1.15rem;} .pgrid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));} .eq-row{gap:4px;} .sl-vert{width:90px;} .hdr h1{font-size:1.5rem;} }
</style>
</head>
<body>

<div id="loader">
  <div class="spin"></div>
  <div class="load-txt" id="load-msg">ĐANG TẢI DỮ LIỆU TỪ SHEET...</div>
</div>

<div id="app">
  <div class="hdr">
    <h1>🎵 SMUSIC PLAYER</h1>
    <div class="sub" id="statusbar">Đang khởi động kết nối Cloud...</div>
  </div>

  <div class="panel">
    <div class="tabbar">
      <button class="active" data-tab="control">Điều khiển</button>
      <button data-tab="eq">EQ Thật</button>
      <button data-tab="spectrum">Spectrum</button>
      <button data-tab="playlist">Toàn bộ phát nhạc</button>
    </div>

    <div id="tab-control" class="tab on">
      <div class="song-title" id="song-title">Chưa chọn bài hát</div>
      <div class="prog-row">
        <input type="range" id="progress" min="0" max="1000" value="0">
        <span class="time-lbl" id="time-lbl">00:00 / 00:00</span>
      </div>
      <div class="vol-row">
        <span>🔊 Âm lượng:</span>
        <input type="range" id="vol-sl" min="0" max="100" value="100">
        <span class="vol-lbl" id="vol-lbl">100%</span>
      </div>
      <div class="btn-row">
        <button class="btn" id="btn-mode"  onclick="toggleMode()">Chế độ: Ngẫu nhiên</button>
        <button class="btn" id="btn-play"  onclick="togglePlay()">▶ Phát / Tạm dừng</button>
        <button class="btn"               onclick="nextTrackBtn()">⏭ Next</button>
      </div>
      <div class="sec-lbl">🎵 Hàng đợi phát hiện tại (Trực tiếp từ Supabase):</div>
      <div class="queue-wrap" id="queue-wrap"></div>
    </div>

    <div id="tab-eq" class="tab">
      <div class="eq-canvas-box"><canvas id="eq-canvas" height="155"></canvas></div>
      <div class="eq-row" id="eq-row"></div>
    </div>

    <div id="tab-spectrum" class="tab">
      <label class="spec-toggle">
        <input type="checkbox" id="spec-chk" checked onchange="toggleSpectrum(this.checked)">
        <span>Bật Spectrum (Tắt để giảm Lag)</span>
      </label>
      <canvas id="spec-canvas" height="210"></canvas>
    </div>

    <div id="tab-playlist" class="tab">
      <div class="pgrid" id="pgrid"></div>
    </div>
  </div>
</div>

<audio id="aud" crossorigin="anonymous" preload="none"></audio>

<script src="smusijs.js"></script>
</body>
</html>
