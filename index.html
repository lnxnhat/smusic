<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎵 Music Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & TOKENS ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0      : #080b14;
  --bg1      : #0e1422;
  --bg2      : #141c30;
  --glass    : rgba(255,255,255,0.04);
  --border   : rgba(255,255,255,0.08);
  --accent   : #00e5b0;
  --accent2  : #0077ff;
  --text0    : #f0f4ff;
  --text1    : #8a9abf;
  --text2    : #4a5880;
  --danger   : #ff4e6a;
  --radius   : 20px;
  --radius-s : 10px;
  --shadow   : 0 24px 64px rgba(0,0,0,.6);
}

html, body {
  height: 100%;
  background: var(--bg0);
  color: var(--text0);
  font-family: 'Syne', sans-serif;
  overflow: hidden;
}

/* ── BACKGROUND MESH ──────────────────────────────────── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 10%,  rgba(0,119,255,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 90%,  rgba(0,229,176,.10) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%,  rgba(8,11,20,1)     0%, transparent 100%);
  pointer-events:none;
}

/* ── LAYOUT ───────────────────────────────────────────── */
#app {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 340px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ── PLAYLIST PANEL ───────────────────────────────────── */
#playlist-panel {
  background: var(--bg1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.pl-header {
  padding: 28px 24px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.pl-header h2 {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text1);
  margin-bottom: 14px;
}

.pl-count {
  font-size: 28px;
  font-weight: 800;
  color: var(--text0);
  line-height: 1;
}

.pl-count span { color: var(--accent); }

/* Search */
.search-wrap {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.search-wrap input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  padding: 10px 14px;
  color: var(--text0);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}

.search-wrap input::placeholder { color: var(--text2); }
.search-wrap input:focus { border-color: var(--accent); }

/* Song list */
#song-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

#song-list::-webkit-scrollbar { width: 4px; }
#song-list::-webkit-scrollbar-track { background: transparent; }
#song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.song-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 24px;
  cursor: pointer;
  transition: background .15s;
  position: relative;
}

.song-item:hover  { background: var(--glass); }
.song-item.active { background: rgba(0,229,176,.06); }
.song-item.active::before {
  content:'';
  position:absolute; left:0; top:20%; bottom:20%;
  width:3px; border-radius:2px;
  background: var(--accent);
}

.song-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  width: 22px;
  text-align: right;
  flex-shrink: 0;
  transition: opacity .2s;
}

.song-item.active .song-num,
.song-item:hover  .song-num { opacity: 0; }

.song-icon {
  position: absolute;
  left: 24px;
  font-size: 14px;
  opacity: 0;
  transition: opacity .2s;
}

.song-item:hover  .song-icon { opacity: .5; }
.song-item.active .song-icon { opacity: 1; }

.song-info { flex: 1; overflow: hidden; }

.song-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color .15s;
}

.song-item.active .song-name { color: var(--accent); }
.song-item:hover  .song-name { color: var(--text0); }

.song-fmt {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  letter-spacing: .05em;
  margin-top: 2px;
}

.song-item.active .song-fmt { color: rgba(0,229,176,.5); }

/* Update button */
.pl-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.btn-update {
  width: 100%;
  padding: 10px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  color: var(--text1);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}

.btn-update:hover {
  background: rgba(0,229,176,.08);
  border-color: var(--accent);
  color: var(--accent);
}

.btn-update:disabled { opacity:.4; cursor:not-allowed; }

/* ── PLAYER PANEL ─────────────────────────────────────── */
#player-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  gap: 32px;
  position: relative;
  overflow: hidden;
}

/* Artwork */
.artwork-wrap {
  position: relative;
  width: 220px; height: 220px;
  flex-shrink: 0;
}

.artwork {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: var(--bg2);
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 72px;
  position: relative;
  transition: transform .6s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 0 0 0 rgba(0,229,176,0);
}

.artwork.spinning {
  animation: spin 12s linear infinite;
  box-shadow: 0 0 40px rgba(0,229,176,.2), 0 0 80px rgba(0,119,255,.1);
}

@keyframes spin { to { transform: rotate(360deg); } }

.artwork::before {
  content:'';
  position:absolute; inset:-6px;
  border-radius:50%;
  border:2px solid transparent;
  background: conic-gradient(var(--accent), var(--accent2), var(--accent)) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity .4s;
}

.artwork.spinning::before { opacity: 1; animation: rotateBorder 4s linear infinite; }
@keyframes rotateBorder { to { transform: rotate(360deg); } }

/* Visualizer bars */
.visualizer {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 28px;
}

.bar {
  width: 4px;
  border-radius: 2px;
  background: var(--accent);
  opacity: .15;
  height: 6px;
  transition: height .1s, opacity .3s;
}

.playing .bar:nth-child(1)  { animation: bar 1.1s ease-in-out infinite alternate; }
.playing .bar:nth-child(2)  { animation: bar 0.8s ease-in-out .1s infinite alternate; }
.playing .bar:nth-child(3)  { animation: bar 1.3s ease-in-out .05s infinite alternate; }
.playing .bar:nth-child(4)  { animation: bar 0.9s ease-in-out .2s infinite alternate; }
.playing .bar:nth-child(5)  { animation: bar 1.0s ease-in-out .15s infinite alternate; }
.playing .bar:nth-child(6)  { animation: bar 1.4s ease-in-out .3s infinite alternate; }
.playing .bar:nth-child(7)  { animation: bar 0.7s ease-in-out .1s infinite alternate; }
.playing .bar:nth-child(8)  { animation: bar 1.2s ease-in-out .25s infinite alternate; }
.playing .bar:nth-child(9)  { animation: bar 0.85s ease-in-out .05s infinite alternate; }
.playing .bar:nth-child(10) { animation: bar 1.15s ease-in-out .2s infinite alternate; }

@keyframes bar {
  from { height: 4px;  opacity:.2; }
  to   { height: 28px; opacity: 1; }
}

/* Track info */
.track-info { text-align: center; width: 100%; max-width: 420px; }

.track-name {
  font-size: 26px;
  font-weight: 800;
  color: var(--text0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -.01em;
}

.track-meta {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text2);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-top: 6px;
}

/* Status / error */
#status-bar {
  font-size: 13px;
  color: var(--text1);
  text-align: center;
  min-height: 20px;
}
#status-bar.error { color: var(--danger); }

/* Progress */
.progress-wrap {
  width: 100%; max-width: 460px;
}

.time-row {
  display: flex;
  justify-content: space-between;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 8px;
}

.progress-bar {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--bg2);
  outline: none;
  cursor: pointer;
  position: relative;
}

.progress-bar::-webkit-slider-runnable-track {
  height: 4px;
  border-radius: 2px;
  background: linear-gradient(to right, var(--accent) var(--pct,0%), var(--bg2) var(--pct,0%));
}

.progress-bar::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: -5px;
  box-shadow: 0 0 8px rgba(0,229,176,.5);
  cursor: pointer;
  transition: transform .15s;
}

.progress-bar:hover::-webkit-slider-thumb { transform: scale(1.3); }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 20px;
}

.ctrl-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text1);
  font-size: 24px;
  padding: 10px;
  border-radius: 50%;
  transition: all .2s;
  display: flex; align-items:center; justify-content:center;
  line-height: 1;
}

.ctrl-btn:hover { color: var(--text0); background: var(--glass); }

.ctrl-btn.primary {
  width: 60px; height: 60px;
  font-size: 28px;
  background: var(--accent);
  color: var(--bg0);
  box-shadow: 0 0 20px rgba(0,229,176,.4);
}

.ctrl-btn.primary:hover {
  background: #00ffc6;
  transform: scale(1.06);
  box-shadow: 0 0 30px rgba(0,229,176,.6);
}

.ctrl-btn:disabled { opacity: .3; cursor: default; }
.ctrl-btn:disabled:hover { background: none; transform: none; }

/* Volume */
.volume-row {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%; max-width: 240px;
}

.vol-icon { font-size: 18px; color: var(--text2); }

.volume-bar {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  border-radius: 2px;
  background: var(--bg2);
  outline: none;
  cursor: pointer;
}

.volume-bar::-webkit-slider-runnable-track {
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(to right, var(--text1) var(--vol,80%), var(--bg2) var(--vol,80%));
}

.volume-bar::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--text1);
  margin-top: -4.5px;
  cursor: pointer;
}

/* Empty / loading state */
#empty-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 16px;
  color: var(--text2);
  font-size: 14px;
  text-align: center;
}

#empty-state .big-icon { font-size: 56px; opacity:.3; }

/* Toast notification */
#toast {
  position: fixed;
  bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 12px 24px;
  font-size: 13px;
  color: var(--text0);
  pointer-events: none;
  opacity: 0;
  transition: all .3s;
  z-index: 999;
  white-space: nowrap;
}

#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Loader */
.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: rot .7s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes rot { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 760px) {
  #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  #playlist-panel { max-height: 42vh; }
  #player-panel   { padding: 24px 20px; gap: 20px; }
  .artwork-wrap   { width: 160px; height: 160px; }
  .track-name     { font-size: 20px; }
}
</style>
</head>
<body>

<div id="app">

  <!-- ──────────── PLAYLIST PANEL ──────────── -->
  <aside id="playlist-panel">
    <div class="pl-header">
      <h2>Danh sách phát</h2>
      <div class="pl-count" id="song-count">
        <span id="count-num">0</span> bài
      </div>
    </div>

    <div class="search-wrap">
      <input id="search-input" type="search" placeholder="🔍  Tìm bài hát…" autocomplete="off"/>
    </div>

    <div id="song-list">
      <!-- Injected by JS -->
      <div id="empty-state" style="display:flex">
        <div class="big-icon">🎵</div>
        <span id="empty-msg">Đang tải danh sách nhạc…<br/>
          <span class="spinner"></span>
        </span>
      </div>
    </div>

    <div class="pl-footer">
      <button class="btn-update" id="btn-update" onclick="refreshFromDrive()">
        🔄  Cập nhật từ Google Drive
      </button>
    </div>
  </aside>

  <!-- ──────────── PLAYER PANEL ──────────── -->
  <main id="player-panel">

    <!-- Artwork -->
    <div class="artwork-wrap">
      <div class="artwork" id="artwork">🎵</div>
    </div>

    <!-- Visualizer -->
    <div class="visualizer" id="visualizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div>
    </div>

    <!-- Track info -->
    <div class="track-info">
      <div class="track-name" id="track-name">—</div>
      <div class="track-meta" id="track-meta">Chọn bài để phát</div>
    </div>

    <!-- Status -->
    <div id="status-bar"></div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="time-row">
        <span id="time-cur">0:00</span>
        <span id="time-dur">0:00</span>
      </div>
      <input type="range" class="progress-bar" id="progress-bar"
             min="0" max="100" value="0" step="0.1"/>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn" id="btn-prev" onclick="prevTrack()" disabled title="Bài trước">⏮</button>
      <button class="ctrl-btn primary" id="btn-play" onclick="togglePlay()" disabled title="Phát / Dừng">▶</button>
      <button class="ctrl-btn" id="btn-next" onclick="nextTrack()" disabled title="Bài tiếp">⏭</button>
    </div>

    <!-- Volume -->
    <div class="volume-row">
      <span class="vol-icon" id="vol-icon">🔊</span>
      <input type="range" class="volume-bar" id="volume-bar"
             min="0" max="1" step="0.01" value="0.8"/>
    </div>

  </main>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Hidden audio element -->
<audio id="audio-el" preload="metadata"></audio>

<script>
// ── CẤU HÌNH ──────────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbzSYNsMXrLZjxBh_U7am5w40h-yhU82c59VsEonBGoeJ_JOU_GOiQYFD5Azx9efWrukdA/exec';

// ── STATE ──────────────────────────────────────────────────────
let songs      = [];          // full list
let filtered   = [];          // list after search
let currentIdx = -1;          // index in `filtered`
let isPlaying  = false;

// ── DOM REFS ───────────────────────────────────────────────────
const audio      = document.getElementById('audio-el');
const songList   = document.getElementById('song-list');
const emptyState = document.getElementById('empty-state');
const emptyMsg   = document.getElementById('empty-msg');
const countNum   = document.getElementById('count-num');
const trackName  = document.getElementById('track-name');
const trackMeta  = document.getElementById('track-meta');
const statusBar  = document.getElementById('status-bar');
const progressBar= document.getElementById('progress-bar');
const timeCur    = document.getElementById('time-cur');
const timeDur    = document.getElementById('time-dur');
const volumeBar  = document.getElementById('volume-bar');
const artwork    = document.getElementById('artwork');
const visualizer = document.getElementById('visualizer');
const btnPlay    = document.getElementById('btn-play');
const btnPrev    = document.getElementById('btn-prev');
const btnNext    = document.getElementById('btn-next');
const btnUpdate  = document.getElementById('btn-update');
const searchInput= document.getElementById('search-input');

// ── INIT ───────────────────────────────────────────────────────
(async function init() {
  setStatus('Đang tải danh sách nhạc…');
  try {
    const res  = await fetch(`${API_URL}?action=getMusic`);
    const json = await res.json();

    if (!json.success || !json.data || json.data.length === 0) {
      throw new Error(json.message || 'Không có dữ liệu. Hãy nhấn "Cập nhật từ Google Drive".');
    }

    songs    = json.data;
    filtered = [...songs];
    renderList();
    setStatus('');
    showToast(`✅ Đã tải ${songs.length} bài hát`);
  } catch (err) {
    setStatus('⚠️ ' + err.message, true);
    showEmptyMsg('Không tải được danh sách. Hãy thử <strong>Cập nhật từ Google Drive</strong>.');
  }
})();

// ── RENDER PLAYLIST ────────────────────────────────────────────
function renderList() {
  // Xoá toàn bộ (giữ emptyState)
  Array.from(songList.children).forEach(el => {
    if (el.id !== 'empty-state') el.remove();
  });

  countNum.textContent = filtered.length;

  if (filtered.length === 0) {
    emptyState.style.display = 'flex';
    showEmptyMsg(songs.length === 0
      ? 'Chưa có bài hát nào.<br/>Nhấn <strong>Cập nhật từ Google Drive</strong>.'
      : 'Không tìm thấy kết quả.');
    return;
  }

  emptyState.style.display = 'none';

  filtered.forEach((song, i) => {
    const el = document.createElement('div');
    el.className = 'song-item' + (i === currentIdx ? ' active' : '');
    el.dataset.idx = i;
    el.innerHTML = `
      <span class="song-num">${i + 1}</span>
      <span class="song-icon">${i === currentIdx && isPlaying ? '▶' : '♪'}</span>
      <div class="song-info">
        <div class="song-name">${escHtml(song.name)}</div>
        <div class="song-fmt">${song.format || '—'}</div>
      </div>
    `;
    el.addEventListener('click', () => selectSong(i, true));
    songList.appendChild(el);
  });
}

// ── SELECT & PLAY ──────────────────────────────────────────────
function selectSong(idx, autoPlay = false) {
  currentIdx = idx;
  const song = filtered[idx];
  if (!song) return;

  updateTrackInfo(song);
  enableControls();

  // Set audio src
  audio.src = song.url;
  audio.load();

  setStatus('');
  statusBar.classList.remove('error');

  if (autoPlay) {
    playAudio();
  } else {
    setPlayBtn(false);
  }

  highlightActive();
  scrollActiveIntoView();
}

function playAudio() {
  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.then(() => {
      isPlaying = true;
      setPlayBtn(true);
      setArtworkSpin(true);
      visualizer.classList.add('playing');
      highlightActive();
    }).catch(err => {
      // Thường do autoplay policy hoặc CORS
      isPlaying = false;
      setPlayBtn(false);
      setArtworkSpin(false);
      visualizer.classList.remove('playing');
      const msg = err.name === 'NotSupportedError'
        ? 'Không hỗ trợ định dạng này trong trình duyệt.'
        : 'Không thể phát. File phải được share "Anyone with the link" trên Drive.';
      setStatus('⚠️ ' + msg, true);
    });
  }
}

function togglePlay() {
  if (currentIdx < 0) return;
  if (audio.paused) {
    playAudio();
  } else {
    audio.pause();
    isPlaying = false;
    setPlayBtn(false);
    setArtworkSpin(false);
    visualizer.classList.remove('playing');
    highlightActive();
  }
}

function prevTrack() {
  if (filtered.length === 0) return;
  const idx = currentIdx <= 0 ? filtered.length - 1 : currentIdx - 1;
  selectSong(idx, isPlaying);
}

function nextTrack() {
  if (filtered.length === 0) return;
  const idx = (currentIdx + 1) % filtered.length;
  selectSong(idx, isPlaying);
}

// ── SEARCH ────────────────────────────────────────────────────
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  filtered = q
    ? songs.filter(s => s.name.toLowerCase().includes(q))
    : [...songs];

  // Giữ lại currentIdx trong filtered (tìm theo id)
  if (currentIdx >= 0) {
    const curSong = filtered[currentIdx]; // may be invalid after filter
    const newIdx = filtered.findIndex(s => s.id === (curSong && curSong.id));
    currentIdx = newIdx; // -1 if not found
  }

  renderList();
});

// ── REFRESH FROM DRIVE ─────────────────────────────────────────
async function refreshFromDrive() {
  btnUpdate.disabled = true;
  btnUpdate.innerHTML = '<span class="spinner"></span> Đang cập nhật…';
  setStatus('');

  try {
    const res  = await fetch(`${API_URL}?action=updateSheet`);
    const json = await res.json();

    if (!json.success) throw new Error(json.message || json.error || 'Lỗi không xác định');

    showToast('✅ ' + json.message);

    // Reload music list
    const res2  = await fetch(`${API_URL}?action=getMusic`);
    const json2 = await res2.json();

    if (json2.success && json2.data) {
      songs    = json2.data;
      filtered = [...songs];
      renderList();
      setStatus('');
    }
  } catch (err) {
    showToast('❌ Lỗi: ' + err.message);
    setStatus('❌ ' + err.message, true);
  } finally {
    btnUpdate.disabled = false;
    btnUpdate.innerHTML = '🔄  Cập nhật từ Google Drive';
  }
}

// ── AUDIO EVENTS ───────────────────────────────────────────────
audio.addEventListener('loadedmetadata', () => {
  timeDur.textContent = fmt(audio.duration);
  updateProgressTrack(0);
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration || audio.seeking) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressBar.value = pct;
  updateProgressTrack(pct);
  timeCur.textContent = fmt(audio.currentTime);
});

audio.addEventListener('ended', () => {
  isPlaying = false;
  setPlayBtn(false);
  setArtworkSpin(false);
  visualizer.classList.remove('playing');
  nextTrack(); // auto-next
});

audio.addEventListener('error', () => {
  const codes = { 1:'Tải bị hủy', 2:'Lỗi mạng', 3:'Lỗi giải mã', 4:'Nguồn không hợp lệ / chưa share công khai' };
  const code  = audio.error ? (audio.error.code || 4) : 4;
  setStatus('⚠️ ' + (codes[code] || 'Lỗi phát nhạc') +
    ' — hãy đảm bảo file được share "Anyone with the link"', true);
  isPlaying = false;
  setPlayBtn(false);
  setArtworkSpin(false);
  visualizer.classList.remove('playing');
});

audio.addEventListener('waiting', () => setStatus('⏳ Đang tải âm thanh…'));
audio.addEventListener('canplay',  () => { if (isPlaying) setStatus(''); });

// ── PROGRESS SEEK ──────────────────────────────────────────────
progressBar.addEventListener('input', () => {
  if (!audio.duration) return;
  audio.currentTime = (progressBar.value / 100) * audio.duration;
  timeCur.textContent = fmt(audio.currentTime);
  updateProgressTrack(parseFloat(progressBar.value));
});

// ── VOLUME ────────────────────────────────────────────────────
const volIcon = document.getElementById('vol-icon');

volumeBar.addEventListener('input', () => {
  audio.volume = volumeBar.value;
  updateVolumeTrack(volumeBar.value * 100);
  volIcon.textContent = volumeBar.value == 0 ? '🔇' : volumeBar.value < 0.5 ? '🔉' : '🔊';
});

// Init volume
audio.volume = 0.8;
updateVolumeTrack(80);

// ── AUTO-NEXT (on end) handled above ──────────────────────────

// ── HELPERS ───────────────────────────────────────────────────
function updateTrackInfo(song) {
  trackName.textContent = song.name;
  trackMeta.textContent = song.format || '';
  timeCur.textContent   = '0:00';
  timeDur.textContent   = '0:00';
  progressBar.value     = 0;
  updateProgressTrack(0);
  // Emoji artwork based on format
  const icons = { M4A:'🎧', WEBM:'🎶', WAV:'🎼' };
  artwork.textContent = icons[song.format] || '🎵';
}

function setPlayBtn(playing) {
  btnPlay.textContent = playing ? '⏸' : '▶';
}

function setArtworkSpin(on) {
  artwork.classList.toggle('spinning', on);
}

function enableControls() {
  btnPlay.disabled = btnPrev.disabled = btnNext.disabled = false;
}

function highlightActive() {
  document.querySelectorAll('.song-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentIdx);
    const icon = el.querySelector('.song-icon');
    if (icon) icon.textContent = (i === currentIdx && isPlaying) ? '▶' : '♪';
  });
}

function scrollActiveIntoView() {
  const el = songList.querySelector('.song-item.active');
  if (el) el.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

function updateProgressTrack(pct) {
  progressBar.style.setProperty('--pct', pct + '%');
}

function updateVolumeTrack(pct) {
  volumeBar.style.setProperty('--vol', pct + '%');
}

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function setStatus(msg, isError = false) {
  statusBar.innerHTML = msg;
  statusBar.classList.toggle('error', isError);
}

function showEmptyMsg(html) {
  emptyMsg.innerHTML = html;
  emptyState.style.display = 'flex';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

function escHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── KEYBOARD SHORTCUTS ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.code) {
    case 'Space':       e.preventDefault(); togglePlay(); break;
    case 'ArrowRight':  nextTrack(); break;
    case 'ArrowLeft':   prevTrack(); break;
    case 'ArrowUp':
      volumeBar.value = Math.min(1, parseFloat(volumeBar.value) + 0.1);
      volumeBar.dispatchEvent(new Event('input'));
      break;
    case 'ArrowDown':
      volumeBar.value = Math.max(0, parseFloat(volumeBar.value) - 0.1);
      volumeBar.dispatchEvent(new Event('input'));
      break;
  }
});
</script>
