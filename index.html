<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SMusic Player - Cloud Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   TOKENS & RESET (Giao diện cũ)
═══════════════════════════════════════════════ */
:root {
  --bg:        #060a14;
  --bg2:       #0c1220;
  --bg3:       #101929;
  --surface:   rgba(12, 18, 32, 0.82);
  --blue:      #3b82f6;
  --bluedark:  #1d4ed8;
  --bluelit:   #93c5fd;
  --cyan:      #22d3ee;
  --white:     #e8f0ff;
  --muted:     #46607c;
  --border:    rgba(59, 130, 246, 0.14);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--white); font-family: 'DM Sans', sans-serif; }
body { padding: 16px; display: flex; justify-content: center; align-items: flex-start; }

/* SCREENSAVER */
#screensaver {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999;
  display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s;
}
#screensaver.ss-active { opacity: 1; pointer-events: auto; }
#ss-song { font-family: 'Exo 2', sans-serif; font-size: 2rem; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); }

/* APP SHELL */
#app { width: 100%; max-width: 960px; display: flex; flex-direction: column; gap: 14px; }
.hdr { text-align: center; padding: 20px 0; }
.hdr h1 { font-family: 'Exo 2', sans-serif; font-size: 2rem; color: var(--bluelit); letter-spacing: 5px; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }

/* TABS */
.tabbar { display: flex; background: rgba(4, 8, 16, 0.55); padding: 10px 10px 0; border-bottom: 1px solid var(--border); }
.tabbar button { background: transparent; color: var(--muted); padding: 10px 18px; border: none; cursor: pointer; border-radius: 10px 10px 0 0; }
.tabbar button.active { color: var(--white); background: var(--surface); border: 1px solid var(--border); border-bottom: none; }
.tab { display: none; padding: 22px; flex-direction: column; gap: 16px; }
.tab.on { display: flex; }

/* DANH SÁCH & NÚT */
.qitem { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05); border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.qitem.now { border-color: var(--blue); background: rgba(59,130,246,.1); }
.qname { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }

.dl-btn { background: transparent; color: var(--cyan); border: 1px solid var(--cyan); border-radius: 4px; padding: 4px 8px; font-size: 11px; cursor: pointer; position: relative; z-index: 10; }
.dl-btn:disabled { color: var(--muted); border-color: var(--muted); cursor: default; }

.btn { background: rgba(59,130,246,.1); color: var(--white); border: 1px solid rgba(147,197,253,.25); border-radius: 8px; padding: 10px 15px; cursor: pointer; font-weight: 600; }
input[type=range] { width: 100%; }
canvas { width: 100%; background: #000; border-radius: 8px; border: 1px solid var(--border); }
#eq-container { display: flex; gap: 10px; justify-content: center; }
.eq-slider-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
.eq-slider-wrap input[type=range] { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 8px; height: 100px; }
</style>
</head>
<body>

<div id="screensaver">
  <div id="ss-song">Đang phát...</div>
</div>

<div id="app">
  <div class="hdr">
    <h1>SMUSIC PLAYER</h1>
    <div id="statusbar" style="color: var(--muted); font-size: 12px; margin-top: 5px;">Sẵn sàng</div>
  </div>

  <div class="panel">
    <div class="tabbar">
      <button class="active" data-tab="control">Control</button>
      <button data-tab="eq">EQ</button>
      <button data-tab="spectrum">Spectrum</button>
      <button data-tab="playlist">Playlist</button>
    </div>

    <div id="tab-control" class="tab on">
      <div id="song-title" style="text-align:center; font-size: 1.2rem; color: var(--bluelit); min-height: 30px;">Chưa chọn bài hát</div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <input type="range" id="progress" min="0" max="1000" value="0">
        <span id="time-lbl" style="font-family: monospace; font-size: 12px;">00:00 / 00:00</span>
      </div>
      <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
        <button class="btn" id="btn-mode" onclick="toggleMode()">Chế độ: Ngẫu nhiên</button>
        <button class="btn" onclick="prevTrack()">Trở lại</button>
        <button class="btn" id="btn-play" onclick="togglePlay()">▶ Play</button>
        <button class="btn" onclick="nextTrack()">Tiếp theo</button>
        <button class="btn" onclick="togglePiP()" style="border-color: var(--cyan); color: var(--cyan);">PiP Mode</button>
      </div>
      <div id="queue-wrap" style="max-height: 250px; overflow-y: auto; margin-top: 15px;"></div>
    </div>

    <div id="tab-eq" class="tab">
      <div id="eq-container"></div>
    </div>

    <div id="tab-spectrum" class="tab">
      <label style="display:flex; align-items:center; gap: 10px; cursor: pointer;">
        <input type="checkbox" id="spec-chk" checked> Bật/Tắt Spectrum
      </label>
      <canvas id="spec-canvas" height="200"></canvas>
      <video id="pip-video" muted playsinline style="display:none;"></video>
    </div>

    <div id="tab-playlist" class="tab">
      <div id="pgrid" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
  </div>
</div>

<audio id="aud" crossorigin="anonymous" preload="none"></audio>
<script src="smusijs.js"></script>
</body>
</html>
